function GripPaySlider({onComplete}){
  const [dragging,setDragging]=useState(false);
  const [offset,setOffset]=useState(0);
  const trackRef=useRef(null);
  const KNOB=44,PADDING=4;
  const getMax=()=>trackRef.current?trackRef.current.offsetWidth-KNOB-PADDING*2:240;
  const startDrag=(clientX)=>{
    setDragging(true);
    const startX=clientX-offset;
    const onMove=(e)=>{
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      const next=Math.max(0,Math.min(cx-startX,getMax()));
      setOffset(next);
      if(next>=getMax()*0.92){
        setOffset(getMax());setDragging(false);
        window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);
        window.removeEventListener("touchmove",onMove);window.removeEventListener("touchend",onUp);
        setTimeout(()=>{onComplete();setOffset(0);},200);
      }
    };
    const onUp=()=>{
      setDragging(false);setOffset(0);
      window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);
      window.removeEventListener("touchmove",onMove);window.removeEventListener("touchend",onUp);
    };
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    window.addEventListener("touchmove",onMove,{passive:true});window.addEventListener("touchend",onUp);
  };
  const progress=trackRef.current?offset/getMax():0;
  return h('div',{ref:trackRef,style:{position:"relative",height:52,borderRadius:26,background:"#1a1040",overflow:"hidden",userSelect:"none",touchAction:"none"}},
    h('div',{style:{position:"absolute",inset:0,background:"linear-gradient(90deg,#7c3aed,#6d28d9)",width:`${KNOB+PADDING*2+offset}px`,transition:dragging?"none":"width 0.2s",borderRadius:26}}),
    h('div',{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}},
      h('span',{style:{fontSize:14,color:"white",fontWeight:900,letterSpacing:"0.02em",opacity:Math.max(0,1-progress*1.5)}},"밀어서 GripPay 결제")
    ),
    h('div',{style:{position:"absolute",right:PADDING,top:PADDING,width:KNOB,height:KNOB,borderRadius:22,background:"#7c3aed",display:"flex",alignItems:"center",justifyContent:"center",opacity:Math.max(0,1-progress*1.5)}},
      h('span',{style:{color:"white",fontSize:20,fontWeight:900,fontStyle:"italic"}},"G")
    ),
    h('div',{onMouseDown:e=>startDrag(e.clientX),onTouchStart:e=>startDrag(e.touches[0].clientX),
      style:{position:"absolute",left:PADDING+offset,top:PADDING,width:KNOB,height:KNOB,borderRadius:22,background:"white",display:"flex",alignItems:"center",justifyContent:"center",cursor:"grab",boxShadow:"0 2px 8px rgba(0,0,0,0.25)",transition:dragging?"none":"left 0.2s",zIndex:2}},
      h(Icon.ChevronRight,{size:22})
    )
  );
}

function OptionPopup({isOpen,onClose,product,onAddToCart}){
  const [sels,setSels]=useState([null,null,null,null,null]);
  const [qty,setQty]=useState(1);
  const [combos,setCombos]=useState([]);
  useEffect(()=>{if(isOpen){setSels([null,null,null,null,null]);setQty(1);setCombos([]);}},[isOpen,product]);
  if(!isOpen||!product)return null;
  const type=product.optionType;
  const depth=type==="none"?0:parseInt(type.replace("depth",""));
  const optsArr=[product.options1,product.options2,product.options3,product.options4,product.options5];
  const lblArr=[product.opt1Label,product.opt2Label,product.opt3Label,product.opt4Label,product.opt5Label];
  const handleSel=(di,val)=>{
    setSels(prev=>{
      const next=[...prev];next[di]=val;
      for(let i=di+1;i<5;i++)next[i]=null;
      const filled=next.slice(0,depth).every(v=>v!==null);
      if(filled){const lbl=next.slice(0,depth).join(" / ");setCombos(p=>p.find(c=>c.label===lbl)?p:[...p,{label:lbl,qty:1}]);}
      return next;
    });
  };
  const updateQty=(idx,d)=>setCombos(p=>p.map((c,i)=>i===idx?{...c,qty:Math.max(1,c.qty+d)}:c));
  const removeCombo=idx=>setCombos(p=>p.filter((_,i)=>i!==idx));
  const canOrder=type==="none"?true:combos.length>0;
  const totalQty=type==="none"?qty:combos.reduce((s,c)=>s+c.qty,0);
  const totalPrice=parsePrice(product.price)*totalQty;
  return h('div',{style:{position:"absolute",inset:0,zIndex:50,display:"flex",alignItems:"flex-end"}},
    h('div',{style:{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)"},onClick:onClose}),
    h('div',{style:{width:"100%",background:"white",borderTopLeftRadius:24,borderTopRightRadius:24,position:"relative",zIndex:1,display:"flex",flexDirection:"column",maxHeight:"88%",overflow:"hidden"}},
      h('div',{style:{width:36,height:4,background:"#e2e8f0",borderRadius:9999,margin:"10px auto",flexShrink:0}}),
      h('div',{style:{display:"flex",alignItems:"center",gap:12,padding:"4px 16px 14px",borderBottom:"1px solid #f1f5f9",flexShrink:0}},
        h(ProductImage,{size:48,radius:10}),
        h('div',{style:{flex:1}},
          h('h4',{style:{fontSize:13,fontWeight:700,color:"#0f172a"}},product.name),
          h('p',{style:{fontSize:18,fontWeight:900,color:"#0f172a",marginTop:2}},product.price)
        ),
        h('button',{onClick:onClose,style:{background:"none",border:"none",cursor:"pointer",color:"#1e293b"}},h(Icon.X))
      ),
      h('div',{style:{flex:1,overflowY:"auto",padding:"16px 16px 0"}},
        type==="none"&&h(SelectedOptionRow,{label:product.name,qty,onQtyChange:d=>setQty(q=>Math.max(1,q+d)),onRemove:null}),
        type!=="none"&&optsArr.slice(0,depth).map((opts,di)=>{
          if(!opts||( di>0&&!sels[di-1]))return null;
          return h(OptionChips,{key:di,label:lblArr[di]||`옵션${di+1}`,options:opts,selected:sels[di],onSelect:v=>handleSel(di,v)});
        }),
        type!=="none"&&combos.length>0&&h('div',{style:{display:"flex",flexDirection:"column",gap:8,marginTop:4}},
          combos.map((c,i)=>h(SelectedOptionRow,{key:c.label,label:c.label,qty:c.qty,onQtyChange:d=>updateQty(i,d),onRemove:()=>removeCombo(i)}))
        ),
        h('div',{style:{marginTop:14}},
          h('p',{style:{fontSize:11,color:"#64748b"}},"배송비 4,000원 / 100,000원 이상 무료배송"),
          h('p',{style:{fontSize:11,color:"#64748b",display:"flex",alignItems:"center",gap:4,marginTop:3}},h(Icon.Truck),h('span',{style:{color:"#f43f5e",fontWeight:900}},"7일")," 이내 배송출발 예정 (휴일 제외)")
        ),
        h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"14px 0",borderTop:"1px solid #f1f5f9",marginTop:12}},
          h('span',{style:{fontSize:13,fontWeight:700,color:"#64748b"}},"상품 총 금액"),
          h('span',{style:{fontSize:20,fontWeight:900,color:"#0f172a"}},totalPrice.toLocaleString()+"원")
        )
      ),
      h('div',{style:{padding:"10px 16px 24px",borderTop:"1px solid #f1f5f9",flexShrink:0}},
        h('button',{onClick:()=>canOrder&&onAddToCart(product,type==="none"?[{label:product.name,qty}]:combos),
          style:{width:"100%",height:52,background:canOrder?"#f43f5e":"#e2e8f0",color:canOrder?"white":"#94a3b8",fontWeight:900,borderRadius:16,fontSize:15,border:"none",cursor:canOrder?"pointer":"default",transition:"all 0.2s"}},"주문하기")
      )
    )
  );
}

    h('div',{style:{position:"absolute",left:14,zIndex:10,display:"flex",flexDirection:"column",gap:5,maxWidth:"80%",justifyContent:"flex-end",bottom:CHAT_BOTTOM,height:100}},

        h('p',{style:{fontSize:11,fontWeight:900}},h('span',{style:{color:m.color}},m.user+" "),h('span',{style:{color:"white",fontWeight:500}},m.text))
      ))
    ),
    upProduct&&h('div',{style:{position:"absolute",zIndex:20,bottom:CARD_BOTTOM,left:14,right:14}},
      h('div',{style:{background:"rgba(255,255,255,0.95)",backdropFilter:"blur(12px)",borderRadius:18,display:"flex",alignItems:"center",padding:7,boxShadow:"0 8px 24px rgba(0,0,0,0.18)"}},
        h(ProductImage,{size:40,radius:9}),
        h('div',{style:{flex:1,padding:"0 10px",minWidth:0}},
          h('p',{style:{color:"#0f172a",fontSize:11,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},upProduct.name),
          h('p',{style:{color:"#f43f5e",fontWeight:900,fontSize:12,marginTop:1}},upProduct.price)
        ),
        h('button',{onClick:()=>setOptionProduct(upProduct),style:{background:"#0f172a",color:"white",fontSize:11,fontWeight:900,padding:"6px 12px",borderRadius:10,marginRight:3,border:"none",cursor:"pointer",whiteSpace:"nowrap"}},"상품보기")
      )
    ),
    h('div',{style:{position:"absolute",bottom:0,left:0,right:0,zIndex:20}},
      h('div',{style:{background:"rgba(17,24,39,0.85)",backdropFilter:"blur(24px)",padding:"10px 14px",display:"flex",alignItems:"center",gap:10,borderTop:"1px solid rgba(255,255,255,0.1)"}},
        h('div',{onClick:()=>openList("products"),style:{width:40,height:40,borderRadius:14,background:"white",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",cursor:"pointer",flexShrink:0,color:"#6366f1"}},
          h(Icon.ShoppingBag,{size:20}),
          products.length>0&&h('div',{style:{position:"absolute",top:-5,right:-5,background:"#f43f5e",width:18,height:18,borderRadius:9999,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:"white",border:"2px solid #111827"}},products.length)
        ),
        h('div',{style:{flex:1,height:40,background:"rgba(0,0,0,0.4)",borderRadius:9999,display:"flex",alignItems:"center",padding:"0 14px",border:"1px solid rgba(255,255,255,0.15)"}},
          h('input',{value:msg,onChange:e=>setMsg(e.target.value),onKeyDown:e=>e.key==="Enter"&&sendMsg(),type:"text",placeholder:"메시지 입력",style:{background:"transparent",border:"none",outline:"none",fontSize:12,color:"white",width:"100%",fontWeight:700,fontFamily:"inherit"}})
        ),
        h('button',{onClick:()=>setLiked(l=>!l),style:{background:"none",border:"none",cursor:"pointer",padding:0}},h(Icon.Heart,{fill:liked?"#f43f5e":"none",color:liked?"#f43f5e":"white",size:24}))
      ),
      h('div',{style:{background:"rgba(17,24,39,0.8)",height:32}})
    ),
    h(ProductListPopup,{isOpen:listOpen,initTab:listInitTab,onClose:()=>setListOpen(false),products,cartItems,cartQty,onProductSelect:p=>{setListOpen(false);setDetailProduct(p);},onDirectBuy:p=>{setListOpen(false);setOptionProduct(p);},onQtyChange,onOrder:()=>{setListOpen(false);setCheckoutOpen(true);},onGripPay:handleGripPay}),
    h(ProductDetailPopup,{isOpen:!!detailProduct,onClose:()=>setDetailProduct(null),product:detailProduct,onAddToCart:handleAddToCart}),
    h(OptionPopup,{isOpen:!!optionProduct,onClose:()=>setOptionProduct(null),product:optionProduct,onAddToCart:handleAddToCart}),
    h(CartToast,{isOpen:toastOpen,onClose:()=>setToastOpen(false),onGoCart:()=>{setToastOpen(false);openList("cart");}}),
    h(OrderCompletePopup,{isOpen:orderCompleteOpen,onClose:()=>setOrderCompleteOpen(false),cartItems,cartQty}),
    h(CheckoutPage,{isOpen:checkoutOpen,onClose:()=>setCheckoutOpen(false),onComplete:()=>{setCheckoutOpen(false);setOrderCompleteOpen(true);},cartItems,cartQty})
  );
}

function PhoneMockup({label,labelColor,children}){
  return h('div',{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:10}},
    h('div',{style:{background:labelColor,color:"white",fontSize:12,fontWeight:900,padding:"6px 18px",borderRadius:9999}},label),
    h('div',{style:{position:"relative",width:300,height:620}},
      h('div',{style:{position:"absolute",top:10,left:"50%",transform:"translateX(-50%)",width:96,height:20,background:"#000",borderRadius:9999,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",gap:6}},
        h('div',{style:{width:7,height:7,borderRadius:9999,background:"#1a1a1a"}}),
        h('div',{style:{width:50,height:4,borderRadius:9999,background:"#1a1a1a"}})
      ),
      h('div',{style:{position:"absolute",inset:0,borderRadius:40,background:"#000",boxShadow:"0 24px 60px rgba(0,0,0,0.4),inset 0 0 0 1px rgba(255,255,255,0.06)"}}),
      h('div',{style:{position:"absolute",inset:3,borderRadius:38,overflow:"hidden",background:"#000"}},children),
      h('div',{style:{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",width:80,height:4,background:"rgba(255,255,255,0.25)",borderRadius:9999,zIndex:50}})
    )
  );
}

function App(){
  const [phase,setPhase]=useState("setup");
  const [products]=useState(PRODUCTS);
  const [upProduct,setUpProduct]=useState(null);
  const [cartItems,setCartItems]=useState([]);
  const [cartQty,setCartQty]=useState({});
  const toggleUp=p=>setUpProduct(prev=>prev?.id===p.id?null:p);
  const addToCart=(product,combos)=>{
    setCartItems(prev=>prev.find(i=>i.id===product.id)?prev:[...prev,product]);
    const tq=combos.reduce((s,c)=>s+c.qty,0);
    setCartQty(prev=>({...prev,[product.id]:(prev[product.id]||0)+tq}));
  };
  const changeQty=(id,d)=>setCartQty(prev=>({...prev,[id]:Math.max(1,(prev[id]||1)+d)}));
  return h('div',{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"linear-gradient(135deg,#e2e8f0 0%,#cbd5e1 100%)",padding:"24px 16px",gap:20}},
    h('div',{style:{textAlign:"center"}},
      h('h1',{style:{fontSize:18,fontWeight:900,color:"#0f172a"}},"🎬 to-be 스토어판매 라이브"),
      h('p',{style:{fontSize:12,color:"#64748b",fontWeight:600,marginTop:4}},"셀러와 고객 화면을 동시에 확인하세요")
    ),
    h('div',{style:{display:"flex",gap:24,alignItems:"flex-start",flexWrap:"wrap",justifyContent:"center"}},
      h(PhoneMockup,{label:"🛍️ 고객 뷰",labelColor:"#f43f5e"},h(CustomerLiveView,{isLive:phase==="live",upProduct,products,cartItems,cartQty,onAddToCart:addToCart,onQtyChange:changeQty})),
      h(PhoneMockup,{label:"📹 셀러 뷰",labelColor:"#0f172a"},phase==="setup"?h(SellerSetupView,{onStart:()=>setPhase("live"),products}):h(SellerLiveView,{upProduct,onToggleUp:toggleUp,products}))
    ),
    h('div',{style:{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center"}},
      [
        phase==="setup"?{icon:"①",text:"셀러: 판매상품 클릭 → 상품 선택",color:"#0f172a"}:{icon:"①",text:"셀러: 쇼핑백 → UP 버튼으로 상품 강조",color:"#0f172a"},
        {icon:"②",text:"고객: 옵션 선택 → 주문하기 → 라이브주문서",color:"#6366f1"},
        {icon:"③",text:"라이브주문서 탭 → 그립페이 밀어서 결제",color:"#7c3aed"},
      ].map(({icon,text,color})=>h('div',{key:icon,style:{background:"white",borderRadius:12,padding:"8px 14px",display:"flex",alignItems:"center",gap:8,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}},
        h('span',{style:{width:22,height:22,borderRadius:9999,background:color,color:"white",fontSize:10,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},icon),
        h('span',{style:{fontSize:11,fontWeight:700,color:"#475569"}},text)
      ))
    ),
    phase==="live"&&h('button',{onClick:()=>setPhase("setup"),style:{padding:"8px 22px",borderRadius:9999,border:"1px solid #cbd5e1",background:"white",fontSize:12,fontWeight:700,color:"#64748b",cursor:"pointer"}},"↩ 설정으로 돌아가기")
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
